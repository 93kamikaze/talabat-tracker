<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>talabat Doha Office Tracker</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --talabat-orange: #ff5a00;
            --talabat-maroon: #480d0d;
        }

        body {
            font-family: 'Poppins', sans-serif; /* Applied Poppins here */
            background-image: url('background.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #access-denied {
            display: none;
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 350px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .logo-container img {
            max-width: 180px;
            margin-bottom: 10px;
        }

        h2 {
            color: var(--talabat-maroon);
            font-weight: 800; /* Extra bold Poppins */
            margin-top: 0;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        input, select {
            font-family: 'Poppins', sans-serif;
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--talabat-orange);
        }

        button {
            font-family: 'Poppins', sans-serif;
            width: 100%;
            padding: 16px;
            background-color: var(--talabat-orange);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover { background-color: #e65100; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .status {
            margin-top: 20px;
            font-weight: 600;
            font-size: 14px;
            color: var(--talabat-maroon);
        }

        .signature {
            margin-top: 30px;
            font-size: 11px;
            color: #480d0d;
            background: rgba(255,255,255,0.7);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="access-denied">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Talabat_logo.svg/2560px-Talabat_logo.svg.png" width="150"><br><br>
        <h2 style="color:red;">ACCESS DENIED</h2>
        <p>Please connect to the <b>talabat Office Wi-Fi</b> to use this tracker.</p>
    </div>

    <div class="container" id="main-app">
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Talabat_logo.svg/2560px-Talabat_logo.svg.png" alt="talabat logo">
        </div>

        <h2>Doha Office Log</h2>

        <form id="timeForm">
            <input type="text" id="name" placeholder="Full Name" required>
            
            <select id="dept" required>
                <option value="" disabled selected>Select Department</option>
                <option value="HR">HR</option>
                <option value="IT">IT</option>
                <option value="NFV">NFV</option>
                <option value="PR">PR</option>
                <option value="Projects">Projects</option>
                <option value="Cloud Kitchen">Cloud Kitchen</option>
                <option value="Logistics">Logistics</option>
                <option value="Marketing">Marketing</option>
                <option value="Performance">Performance</option>
                <option value="Sales-Food">Sales-Food</option>
            </select>

            <input type="number" id="floor" placeholder="Floor Number" required>

            <select id="action" required>
                <option value="Time-In">Time-In</option>
                <option value="Time-Out">Time-Out</option>
            </select>

            <button type="submit" id="submitBtn">Submit Log</button>
        </form>

        <div id="msg" class="status"></div>
    </div>

    <div class="signature">Made by Batman®</div>

    <script>
        // --- 1. OPTIONAL IP SECURITY ---
        // To use: Search "What is my IP" on Google while on office WiFi.
        // Replace YOUR_OFFICE_IP_HERE and uncomment verifyIP();
        const OFFICE_IP = "YOUR_OFFICE_IP_HERE"; 

        async function verifyIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                if (data.ip !== OFFICE_IP) {
                    document.getElementById('main-app').style.display = 'none';
                    document.getElementById('access-denied').style.display = 'block';
                }
            } catch (e) { console.log("Security Bypass Mode"); }
        }
        
        // verifyIP(); // Delete the // at the start of this line to enable IP blocking.

        // --- 2. LOGIC ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxF6pSHddt91U7xVkNFJqgpy39U6rf4g7A-r_vdHh_y6rHKciUWL-Z_HW5BfBAgUCPZ/exec';
        const form = document.getElementById('timeForm');
        const msg = document.getElementById('msg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            const dohaTime = new Date().toLocaleString("en-US", {
                timeZone: "Asia/Qatar",
                hour12: true,
                dateStyle: "medium",
                timeStyle: "medium"
            });

            const formData = new FormData();
            formData.append('Name', document.getElementById('name').value);
            formData.append('Department', document.getElementById('dept').value);
            formData.append('Floor', document.getElementById('floor').value);
            formData.append('Action', document.getElementById('action').value);
            formData.append('Timestamp', dohaTime);

            document.getElementById('submitBtn').disabled = true;
            msg.innerHTML = "Recording...";

            fetch(scriptURL, { method: 'POST', body: formData})
                .then(response => {
                    msg.innerHTML = "✅ Success! Logged at " + dohaTime;
                    form.reset();
                    document.getElementById('submitBtn').disabled = false;
                })
                .catch(error => {
                    msg.innerHTML = "❌ Error. Try again.";
                    document.getElementById('submitBtn').disabled = false;
                });
        });
    </script>
</body>
</html>
